spring:
  application:
    name: webflux-app

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:

    # 1) Sin autenticación (desarrollo local)
    uri: mongodb://localhost:27017/test

    # 2) Usuario y password en la URI
    # uri: mongodb://admin:secret@localhost:27017/test?authSource=admin

    # 3) Credenciales separadas (equivalente al caso anterior)
    # host: localhost
    # port: 27017
    # database: test
    # username: admin
    # password: secret
    # authentication-database: admin

    # 4) Replica set sin autenticación
    # uri: mongodb://host1:27017,host2:27017,host3:27017/test?replicaSet=rs0

    # 5) Replica set con autenticación
    # uri: mongodb://admin:secret@host1:27017,host2:27017,host3:27017/test?replicaSet=rs0&authSource=admin

    # 6) MongoDB Atlas (cluster cloud)
    # uri: mongodb+srv://admin:secret@cluster0.xxxxx.mongodb.net/test?retryWrites=true&w=majority

server:
  port: 8080
  error:
    include-stacktrace: never
    include-message: never

# ── Springdoc / OpenAPI ────────────────────────────────────────────────────
# Rutas personalizadas (opcional):
# springdoc:
#   api-docs:
#     path: /api-docs
#   swagger-ui:
#     path: /swagger-ui.html

# ── Deshabilitar OpenAPI en producción ─────────────────────────────────────
# Para evitar exponer la documentación en entornos productivos, añade estas
# propiedades (o sobreescríbelas en application-prod.yaml):
#
# springdoc:
#   api-docs:
#     enabled: false        # desactiva GET /v3/api-docs
#   swagger-ui:
#     enabled: false        # desactiva GET /swagger-ui/index.html
#
# Con ambas a false el contrato OpenAPI y la interfaz Swagger dejan de estar
# accesibles sin necesidad de eliminar la dependencia del pom.xml.
